[tools]
java = "temurin-17.0.19+10"
maven = "3.9.16"

[tasks.build]
description = "Build the java client"
run = "mvn -B clean package"

[tasks.set-release-version]
description = "Set Maven project version for a release"
run = "mvn -B versions:set -DnewVersion=\"${RELEASE_TAG}\" -DgenerateBackupPoms=false"

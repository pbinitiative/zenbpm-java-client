name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version with v prefix, for example v2.0.0.
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}/mise.toml
      RELEASE_TAG: ${{ inputs.version }}
    steps:
      - name: Validate release tag
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release tag must start with v and look like vX.Y.Z: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID_ZENBPM_RELEASE }}
          private-key: ${{ secrets.APP_PRIVATE_KEY_ZENBPM_RELEASE  }}
          owner: pbinitiative
          repositories: |
            zenbpm-java-client
            zenbpm

      - name: Checkout java client
        uses: actions/checkout@v4
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          fetch-depth: 0

      - name: Fail if tag already exists
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          if gh api -H "Accept: application/vnd.github+json" "/repos/pbinitiative/zenbpm-java-client/git/ref/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists in zenbpm-java-client" >&2
            exit 1
          fi

      - name: Setup mise tools
        uses: jdx/mise-action@v3
        with:
          cache: true
          install: true

      - name: Download sources from backend tag
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          gh api "/repos/pbinitiative/zenbpm/contents/openapi/api.yaml?ref=${RELEASE_TAG}" --jq .content \
            | base64 -d > zenbpm-client-core/src/main/resources/openapi/api.yaml
          gh api "/repos/pbinitiative/zenbpm/contents/pkg/zenclient/proto/zenbpm.proto?ref=${RELEASE_TAG}" --jq .content \
            | base64 -d > zenbpm-client-core/src/main/resources/proto/zenbpm.proto

      - name: Set Maven version
        run: mise run set-release-version

      - name: Build java client
        run: mvn -B clean verify -Dgpg.skip=true

      - name: Commit release changes
        run: |
          git config user.name "zenbpm-release-bot"
          git config user.email "zenbpm-release-bot@users.noreply.github.com"
          git add pom.xml zenbpm-client-core/pom.xml zenbpm-spring-boot-starter/pom.xml zenbpm-client-core/src/main/resources/openapi/api.yaml zenbpm-client-core/src/main/resources/proto/zenbpm.proto
          if git diff --cached --quiet; then
            echo "No java-client release changes to commit."
          else
            git commit -m "chore: release $RELEASE_TAG"
          fi

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s' "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" | gpg --batch --import
          printf 'use-agent\npinentry-mode loopback\n' > ~/.gnupg/gpg.conf

      - name: Deploy to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn -B deploy \
            -P release \
            -DskipTests \
            -Dgpg.skip=false \
            --settings .github/settings.xml

      - name: Tag and push
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          git tag "$RELEASE_TAG"
          git push "https://x-access-token:${GH_TOKEN}@github.com/pbinitiative/zenbpm-java-client.git" HEAD:main "$RELEASE_TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          shopt -s globstar nullglob
          artifacts=(**/target/*.jar)
          gh release create "$RELEASE_TAG" "${artifacts[@]}" --generate-notes --verify-tag

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zenbpm-java-client-${{ inputs.version }}
          path: |
            **/target/*.jar
            !**/target/original-*.jar

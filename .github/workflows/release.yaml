# =============================================================================
# Release pipeline for zenbpm-java-client
#
# Triggered when a version tag (e.g. v1.2.3) is pushed to this repository.
# The expected flow is:
#   1. Another pipeline (e.g. pbinitiative/zenbpm) updates api.yaml in this
#      repo and commits it to main.
#   2. That same pipeline pushes a matching version tag to this repo.
#   3. This workflow fires, stamps the version, builds, runs tests, and
#      creates a GitHub Release.
#
# Publishing is handled by JitPack — no deploy step needed.
# JitPack picks up the GitHub Release tag automatically and builds on demand.
#
# Requirements: no secrets beyond the default GITHUB_TOKEN.
# =============================================================================

name: Release to Maven Repository

on:
  # Triggered by pushing a version tag, e.g.: git tag v1.2.3 && git push origin v1.2.3
  push:
    tags:
      - 'v*'

  # Manual trigger for testing or ad-hoc releases
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to publish (e.g., v1.2.0)'
        required: true
        type: string

permissions:
  contents: write      # create GitHub Release

env:
  JAVA_VERSION: '8'
  MAVEN_CLI_OPTS: '-B -ntp'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── Version -----------------------------------------------------------
      - name: Determine release version
        id: version
        run: |
          case "${{ github.event_name }}" in
            push)
              VERSION="${{ github.ref_name }}"
              ;;
            workflow_dispatch)
              VERSION="${{ github.event.inputs.version }}"
              ;;
          esac

          # Validate format — expects "vX.Y.Z" or "vX.Y.Z-rcN"
          if ! echo "${VERSION}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: version '${VERSION}' does not match vX.Y.Z format"
            exit 1
          fi

          echo "VERSION=${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"

      # ── Checkout sources --------------------------------------------------
      - name: Checkout zenbpm-java-client
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Java + Maven setup ------------------------------------------------
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── Version bump (transient — not committed back) --------------------
      # The tag is the source of truth for the version. We apply it in-place
      # so that the built artifacts carry the right version, but we do not
      # push any changes back to the repo.
      - name: Set project version to match tag
        run: |
          mvn ${MAVEN_CLI_OPTS} \
            versions:set \
            -DnewVersion="${{ steps.version.outputs.version_no_v }}" \
            -DgenerateBackupPoms=false

      # ── Build --------------------------------------------------------------
      - name: Build & run tests
        run: mvn ${MAVEN_CLI_OPTS} clean verify

      # ── GitHub Release ----------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## ZenBPM Java Client ${{ steps.version.outputs.version }}

            ### Changes
            - Updated api.yaml from ZenBPM ${{ steps.version.outputs.version }}
            - Generated updated REST client and DTOs

            ### Using this release via JitPack
            ```xml
            <dependency>
              <groupId>com.github.pbinitiative.zenbpm-java-client</groupId>
              <artifactId>zenbpm-spring-boot-starter</artifactId>
              <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```
          files: |
            zenbpm-client-core/target/*.jar
            zenbpm-spring-boot-starter/target/*.jar
          fail_on_unmatched_files: true

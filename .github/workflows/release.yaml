# =============================================================================
# Release pipeline for zenbpm-java-client
#
# Triggered via repository_dispatch from the zenbpm main repo after a release
# is published there. The zenbpm release workflow sends a repository_dispatch
# event with the release tag in client_payload.
#
# This workflow:
#   1. Checks out this repo and the zenbpm main repo at the matching tag.
#   2. Copies the latest api.yaml from zenbpm into this repo.
#   3. Commits and pushes the updated api.yaml.
#   4. Stamps the version, builds, runs tests, and creates a GitHub Release.
#
# Publishing is handled by JitPack — no deploy step needed.
# JitPack picks up the GitHub Release tag automatically and builds on demand.
#
# Requirements:
#   - GITHUB_TOKEN (default) — used to push the api.yaml commit.
#   - For workflow_dispatch manual token input only: a PAT with contents:write.
# =============================================================================

name: Release to Maven Repository

on:
  # Triggered by repository_dispatch from zenbpm release workflow
  repository_dispatch:
    types: [release_published]

  # Manual trigger for testing or ad-hoc releases
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag from zenbpm (e.g., v1.2.0)'
        required: true
        type: string

permissions:
  contents: write      # push api.yaml commit + create GitHub Release

env:
  JAVA_VERSION: '17'
  MAVEN_CLI_OPTS: '-B -ntp'
  ZENBPM_REPO: 'pbinitiative/zenbpm'
  API_YAML_PATH: 'zenbpm-client-core/src/main/resources/openapi/api.yaml'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── Version -----------------------------------------------------------
      - name: Determine release version
        id: version
        run: |
          case "${{ github.event_name }}" in
            repository_dispatch)
              VERSION="${{ github.event.client_payload.release_tag }}"
              ;;
            workflow_dispatch)
              VERSION="${{ github.event.inputs.release_tag }}"
              ;;
          esac

          # Validate format — expects "vX.Y.Z" or "vX.Y.Z-rcN"
          if ! echo "${VERSION}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "ERROR: version '${VERSION}' does not match vX.Y.Z format"
            exit 1
          fi

          echo "VERSION=${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${VERSION#v}" >> "$GITHUB_OUTPUT"

      # ── Checkout this repo ------------------------------------------------
      - name: Checkout zenbpm-java-client
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Pull zenbpm repo and copy api.yaml --------------------------------
      - name: Pull api.yaml from zenbpm ${{ steps.version.outputs.version }}
        run: |
          echo "Cloning ${{ env.ZENBPM_REPO }} at tag ${{ steps.version.outputs.version }}..."
          git clone --depth 1 --branch "${{ steps.version.outputs.version }}" \
            "https://github.com/${{ env.ZENBPM_REPO }}.git" /tmp/zenbpm

          echo "Copying api.yaml..."
          cp /tmp/zenbpm/openapi/api.yaml "${{ env.API_YAML_PATH }}"

          echo "--- api.yaml diff ---"
          git diff --stat "${{ env.API_YAML_PATH }}" || true

      # ── Commit updated api.yaml -------------------------------------------
      - name: Commit updated api.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ env.API_YAML_PATH }}"
          git commit -m "feat: update api.yaml from zenbpm ${{ steps.version.outputs.version }}" || {
            echo "No changes to commit — api.yaml is already up to date."
            exit 0
          }
          git push

      # ── Java + Maven setup ------------------------------------------------
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── Version bump (transient — not committed back) ---------------------
      - name: Set project version to match tag
        run: |
          mvn ${MAVEN_CLI_OPTS} \
            versions:set \
            -DnewVersion="${{ steps.version.outputs.version_no_v }}" \
            -DgenerateBackupPoms=false

      # ── Build --------------------------------------------------------------
      - name: Build & run tests
        run: mvn ${MAVEN_CLI_OPTS} clean verify

      # ── GitHub Release ----------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## ZenBPM Java Client ${{ steps.version.outputs.version }}

            ### Changes
            - Updated api.yaml from ZenBPM ${{ steps.version.outputs.version }}
            - Generated updated REST client and DTOs

            ### Using this release via JitPack
            ```xml
            <dependency>
              <groupId>com.github.pbinitiative.zenbpm-java-client</groupId>
              <artifactId>zenbpm-spring-boot-starter</artifactId>
              <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```
          files: |
            zenbpm-client-core/target/*.jar
            zenbpm-spring-boot-starter/target/*.jar
          fail_on_unmatched_files: true
